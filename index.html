<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CECSO · Operations Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Login -->
<div id="login-screen"></div>

<!-- App Shell -->
<div id="app">
  <!-- Header -->
  <header class="app-header" id="app-header"></header>

  <!-- Search Bar -->
  <div class="search-bar" id="search-bar"></div>

  <!-- Main Content -->
  <main class="app-body">
    <div id="dashboard-view"></div>
    <div id="operations-list-view" style="display:none"></div>
    <div id="detail-view" style="display:none"></div>
  </main>
</div>

<!-- Config Modal -->
<div id="config-modal" class="modal-overlay" style="display:none"></div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

<!-- App Modules -->
<script src="js/config.js"></script>
<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script src="js/gmail.js"></script>
<script src="js/parser.js"></script>
<script src="js/store.js"></script>
<script src="js/components/login.js"></script>
<script src="js/components/search.js"></script>
<script src="js/components/dashboard.js"></script>
<script src="js/components/operations-list.js"></script>

<script src="js/app.js"></script>

</html>
